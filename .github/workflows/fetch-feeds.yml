name: Fetch RSS Feeds

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch feeds
        run: |
          cat << 'EOF' > fetch_feeds.py
          import json
          import urllib.request
          import urllib.error
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          import re

          FEEDS = {
            "progressive": [
              {"name": "Democracy Now!", "url": "https://www.democracynow.org/democracynow.rss"},
              {"name": "The Intercept",  "url": "https://theintercept.com/feed/?rss"},
              {"name": "Mother Jones",   "url": "https://www.motherjones.com/feed/"},
              {"name": "In These Times", "url": "https://inthesetimes.com/feed"},
            ],
            "library": [
              {"name": "ALA News",           "url": "https://americanlibrariesmagazine.org/feed/"},
              {"name": "AALL Net",           "url": "https://www.aallnet.org/feed/"},
              {"name": "School Lib Journal", "url": "https://www.slj.com/feed"},
              {"name": "Krafty Librarian",   "url": "https://www.kraftylibrarian.com/feed/"},
            ],
            "legal": [
              {"name": "SCOTUSblog",    "url": "https://www.scotusblog.com/feed/"},
              {"name": "TaxProf Blog",  "url": "https://taxprofblog.aals.org/feed/"},
              {"name": "Above the Law", "url": "https://abovethelaw.com/feed/"},
            ],
            "legaltech": [
              {"name": "Artificial Lawyer", "url": "https://www.artificiallawyer.com/feed/"},
              {"name": "LawNext",           "url": "https://www.lawnext.com/feed"},
              {"name": "beSpacific",        "url": "https://www.bespacific.com/feed/"},
            ],
            "houston": [
              {"name": "ABC13 Houston", "url": "https://abc13.com/feed"},
              {"name": "Click2Houston", "url": "https://www.click2houston.com/arc/outboundfeeds/rss/category/news/local/?outputType=xml&size=10"},
              {"name": "The Defender",  "url": "https://defendernetwork.com/feed"},
            ],
            "texas": [
              {"name": "Texas Tribune",     "url": "https://feeds.texastribune.org/feeds/main/"},
              {"name": "Texas Observer",    "url": "https://texasobserver.org/feed/"},
              {"name": "KUT Austin",        "url": "https://www.kut.org/podcast/kut-news-now/feed"},
            ],
          }

          NAMESPACES = {
            'content': 'http://purl.org/rss/1.0/modules/content/',
            'dc':      'http://purl.org/dc/elements/1.1/',
            'atom':    'http://www.w3.org/2005/Atom',
            'media':   'http://search.yahoo.com/mrss/',
          }

          def clean(text):
            if not text:
              return ""
            text = re.sub(r'<[^>]+>', '', text)
            text = re.sub(r'\s+', ' ', text).strip()
            return text[:300]

          def parse_feed(url):
            headers = {
              'User-Agent': 'Mozilla/5.0 (compatible; NewsDashboard/1.0)',
              'Accept': 'application/rss+xml, application/xml, text/xml, */*',
            }
            req = urllib.request.Request(url, headers=headers)
            try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                data = resp.read()
            except Exception as e:
              return {"error": str(e), "items": []}

            try:
              root = ET.fromstring(data)
            except ET.ParseError as e:
              return {"error": f"XML parse error: {e}", "items": []}

            # Handle both RSS and Atom
            items = []
            ns = NAMESPACES

            # RSS
            channel = root.find('channel')
            if channel is not None:
              for item in channel.findall('item')[:10]:
                title = clean(item.findtext('title', ''))
                link  = (item.findtext('link', '') or '').strip()
                date  = (item.findtext('pubDate', '') or item.findtext(f'{{{ns["dc"]}}}date', '')).strip()
                if title and link:
                  items.append({"title": title, "link": link, "date": date})

            # Atom
            atom_ns = 'http://www.w3.org/2005/Atom'
            for entry in root.findall(f'{{{atom_ns}}}entry')[:10]:
              title = clean(entry.findtext(f'{{{atom_ns}}}title', ''))
              link_el = entry.find(f'{{{atom_ns}}}link')
              link = (link_el.get('href', '') if link_el is not None else '').strip()
              date = (entry.findtext(f'{{{atom_ns}}}published', '') or
                      entry.findtext(f'{{{atom_ns}}}updated', '')).strip()
              if title and link:
                items.append({"title": title, "link": link, "date": date})

            return {"items": items}

          results = {}
          for category, feeds in FEEDS.items():
            results[category] = []
            for feed in feeds:
              print(f"Fetching {feed['name']}...")
              parsed = parse_feed(feed["url"])
              results[category].append({
                "name": feed["name"],
                "url":  feed["url"],
                **parsed
              })

          output = {
            "updated": datetime.now(timezone.utc).isoformat(),
            "categories": results
          }

          with open("feeds.json", "w") as f:
            json.dump(output, f)

          print("Done. feeds.json written.")
          EOF
          python3 fetch_feeds.py

      - name: Commit feeds.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --staged --quiet || git commit -m "chore: refresh feeds $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push